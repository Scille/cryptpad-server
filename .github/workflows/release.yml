name: Release new version

on:
  pull_request:
    paths:
      - .github/workflows/build.yml
      - .github/workflows/release.yml
      - .github/workflows/docker-cryptpad.yml
  push:
    tags:
      - "v[0-9]+.**"

# We set `concurrency` to prevent having this workflow being run on code that is not up-to-date on a PR (a user make multiple push in a quick manner).
# But outside of a PR, we want to have only 1 workflow to be run at the same time on a given git ref
concurrency:
  group: release-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yml
  release:
    needs:
      - build
    runs-on: ubuntu-24.04
    steps: 
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          artifact-ids: |
            ${{ needs.build.outputs.artifact-id }}
          skip-decompress: true # We want to provide the build as a zip archive in the release's assets
        timeout-minutes: 2

      - name: List artifacts
        run: tree artifacts
        timeout-minutes: 1

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: false
          files:
            artifacts/cryptpad-server.zip
        timeout-minutes: 2
          
