# nginx reverse proxy configuration for cryptpad-server
#
# Replace the following placeholders before use:
#   YOUR_MAIN_DOMAIN    — e.g. cryptpad.example.com
#   YOUR_SANDBOX_DOMAIN — e.g. cryptpad-sandbox.example.com  (must be a different domain/subdomain)
#   /path/to/cert.pem   — TLS certificate (e.g. managed by certbot)
#   /path/to/key.pem    — TLS private key
#
# After editing, test with: nginx -t
# Then reload with: systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_MAIN_DOMAIN YOUR_SANDBOX_DOMAIN;
    return 301 https://$host$request_uri;
}

# Main domain
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_MAIN_DOMAIN;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    # Proxy HTTP traffic to CryptPad
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket traffic
    location /cryptpad_websocket {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}

# Sandbox domain (required by CryptPad's security model)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_SANDBOX_DOMAIN;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /cryptpad_websocket {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
